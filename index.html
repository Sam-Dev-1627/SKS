<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sai 💜</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a29bfe;
            --secondary: #6c5ce7;
            --accent: #fd79a8;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: #0f0c29;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
        }

        header {
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin: 0;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(162, 155, 254, 0.5);
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            max-width: 500px;
            width: 85%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            z-index: 10;
        }

        #typewriter {
            min-height: 70px;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #efdeff;
        }

        .btn-gift {
            background: linear-gradient(45deg, var(--secondary), var(--accent));
            border: none;
            padding: 16px 35px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .btn-gift:hover {
            transform: scale(1.08);
            box-shadow: 0 0 25px var(--secondary);
        }

        /* The Surprise Overlay */
        #surprise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 25, 0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .me-text {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--primary));
            margin: 10px 0;
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Slideshow */
        #slideshow-section {
            display: none;
            width: 90%;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
        }

        .slide-frame {
            border: 6px solid white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }

        .slide-frame img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            transition: opacity 0.6s ease;
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 3000;
        }
    </style>
</head>
<body>

<div class="stars"></div>

<header>
    <h1>Happy Birthday, Sai! 🎂</h1>
</header>

<div class="main-card" id="intro-card">
    <p id="typewriter"></p>
    <button class="btn-gift" onclick="triggerSurprise()">Reveal Your Gift 🎁</button>
</div>

<div id="surprise-overlay">
    <p style="font-size: 1.2rem; letter-spacing: 2px;">READY?</p>
    <h2 class="me-text">IT'S ME! 😎💜</h2>
    <p style="opacity: 0.8;">Your limited edition best friend.</p>
    <button class="btn-gift" onclick="startSlideshow()" style="margin-top: 30px;">See Our Memories ✨</button>
</div>

<section id="slideshow-section">
    <h2 style="font-family: 'Dancing Script'; font-size: 2.5rem; color: var(--accent);">Moments to Remember</h2>
    <div class="slide-frame">
        <img id="main-slide" src="photo1.jpg">
    </div>
    <p id="slide-caption" style="margin-top: 15px; font-style: italic; color: var(--primary);"></p>
    <div style="margin-top: 20px;">
        <button class="btn-gift" onclick="moveSlide(-1)" style="padding: 10px 25px;">❮</button>
        <button class="btn-gift" onclick="moveSlide(1)" style="padding: 10px 25px;">❯</button>
    </div>
</section>

<script>
    // 1. Updated Typewriter Text
    const textToType = "I searched for the perfect gift... but nothing is better than this 😌";
    let index = 0;
    function type() {
        if (index < textToType.length) {
            document.getElementById("typewriter").innerHTML += textToType.charAt(index);
            index++;
            setTimeout(type, 60);
        }
    }
    window.onload = type;

    // 2. Surprise Sequence
    function triggerSurprise() {
        document.getElementById('surprise-overlay').style.display = 'flex';
        spawnConfetti();
    }

    function startSlideshow() {
        document.getElementById('surprise-overlay').style.display = 'none';
        document.getElementById('intro-card').style.display = 'none';
        const section = document.getElementById('slideshow-section');
        section.style.display = 'block';
        section.scrollIntoView({ behavior: 'smooth' });
        runAutoSlide();
    }

    // 3. Slideshow Core
    const photos = ["photo1.jpg", "photo2.jpg", "photo3.jpg"]; // Update these!
    const quotes = ["One for the books! 📸", "Best times with the best person.", "To more adventures! 🥂"];
    let slideIdx = 0;

    function updateSlide() {
        const img = document.getElementById('main-slide');
        const cap = document.getElementById('slide-caption');
        img.style.opacity = 0;
        setTimeout(() => {
            img.src = photos[slideIdx];
            cap.innerText = quotes[slideIdx] || "";
            img.style.opacity = 1;
        }, 300);
    }

    function moveSlide(n) {
        slideIdx = (slideIdx + n + photos.length) % photos.length;
        updateSlide();
    }

    function runAutoSlide() {
        setInterval(() => moveSlide(1), 4500);
    }

    // 4. Confetti Effect
    function spawnConfetti() {
        const colors = ['#a29bfe', '#fd79a8', '#fab1a0', '#55efc4'];
        for(let i=0; i<80; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.innerHTML = '💜';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.top = '-20px';
            c.style.color = colors[Math.floor(Math.random()*colors.length)];
            c.style.fontSize = Math.random() * 20 + 15 + 'px';
            c.style.transition = `transform ${Math.random()*3+2}s linear`;
            document.body.appendChild(c);
            setTimeout(() => {
                c.style.transform = `translateY(110vh) rotate(${Math.random()*360}deg)`;
            }, 50);
            setTimeout(() => c.remove(), 5000);
        }
    }
</script>

</body>
</html>
